<!DOCTYPE html>
<html lang="ko"><head><meta name="robots" content="noindex, nofollow, noarchive, nosnippet"><meta name="googlebot" content="noindex, nofollow">
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>전국 주택 통계</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="data.js" onerror="this.dataset.f=1"></script>
<script src="tenure.js" onerror="this.dataset.f=1"></script>
<script src="area.js" onerror="this.dataset.f=1"></script>
<script src="age.js" onerror="this.dataset.f=1"></script>
<script src="supply.js" onerror="this.dataset.f=1"></script>
<script src="own.js" onerror="this.dataset.f=1"></script>
<script src="conc.js" onerror="this.dataset.f=1"></script>
<script src="tenure_yr.js" onerror="this.dataset.f=1"></script>
<script src="loan.js" onerror="this.dataset.f=1"></script>
<style>
 :root{--bg:#0e1320;--card:#1b2435;--ink:#f6f9ff;--sub:#c3cee0;--line:#34405a;--acc:#6ba2ff;--acc2:#46dcb2;--warn:#ffc066;}
 *{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--ink);
   font-family:'Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;line-height:1.5;font-size:15px;}
 .muted{color:var(--sub);font-size:13px;}
 .app{display:flex;min-height:100vh;max-width:1680px;margin:0 auto;}
 .sidebar{width:300px;flex-shrink:0;background:#0a0f19;border-right:1px solid var(--line);
   position:sticky;top:0;height:100vh;overflow-y:auto;padding:20px 14px;display:flex;flex-direction:column;}
 .brand{font-size:17px;font-weight:700;line-height:1.35;margin-bottom:18px;}
 .brand span{display:block;color:var(--sub);font-size:12.5px;font-weight:500;margin-top:3px;}
 .navtitle{color:var(--sub);font-size:11.5px;letter-spacing:.5px;margin:14px 4px 7px;}
 .nav{display:flex;flex-direction:column;gap:3px;}
 .navbtn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:10px 12px;border:1px solid transparent;
   border-radius:9px;background:transparent;color:var(--sub);cursor:pointer;font-size:14.5px;}
 .navbtn:hover{background:#121a2a;} .navbtn.active{background:var(--acc);color:#fff;font-weight:600;}
 .chips{display:flex;flex-wrap:wrap;gap:5px;}
 .chip{padding:6px 10px;border:1px solid var(--line);border-radius:14px;font-size:12.5px;cursor:pointer;color:var(--sub);background:#0f1626;}
 .chip.on{background:var(--acc);color:#fff;border-color:var(--acc);}
 .chip.all{border-style:dashed;}
 .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;vertical-align:middle;}
 .seg button{background:#0f1626;color:var(--sub);border:none;padding:6px 13px;cursor:pointer;font-size:13px;}
 .seg button.on{background:var(--acc);color:#fff;}
 .main{flex:1;min-width:0;} .wrap{padding:20px 28px 60px;}
 h1{margin:0;font-size:21px;} .sub2{color:var(--sub);font-size:13px;margin-top:4px;}
 .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:16px 0;}
 .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;}
 .kpi .v{font-size:25px;font-weight:700;} .kpi .v small{font-size:13px;color:var(--sub);font-weight:500;}
 .kpi .k{color:var(--sub);font-size:13px;margin-top:4px;}
 .shead{display:flex;align-items:baseline;gap:10px;margin:6px 0 2px;}
 .shead h2{font-size:19px;margin:0;} .shead .q{color:var(--sub);font-size:13.5px;}
 .insight{background:#12243f;border-left:3px solid var(--acc);color:#dce9ff;font-size:14.5px;line-height:1.5;
   padding:11px 14px;border-radius:0 8px 8px 0;margin:10px 0 14px;min-height:68px;}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
 .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;}
 .panel.full{grid-column:1/-1;} .panel h3{margin:0 0 12px;font-size:15px;font-weight:600;}
 .chartbox{position:relative;height:330px;} .chartbox.tall{height:420px;}
 table{width:100%;border-collapse:collapse;font-size:13.5px;} th,td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:right;}
 th:first-child,td:first-child{text-align:left;} th{color:var(--sub);font-weight:600;}
 .tablewrap{max-height:420px;overflow:auto;}
 .badge{font-size:12px;padding:3px 9px;border-radius:999px;background:#3a2a12;color:var(--warn);border:1px solid #6b4d18;}
 .note{color:var(--warn);font-size:12.5px;}
 @media(max-width:980px){.grid{grid-template-columns:1fr;}}
 @media(max-width:760px){.app{flex-direction:column;} .sidebar{width:auto;height:auto;position:static;} .nav{flex-direction:row;flex-wrap:wrap;} .navbtn{width:auto;}}
</style></head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="brand">🏠 전국 주택 통계 <span id="demoBadge" class="badge" style="display:none;">예시 데이터</span>
    <span>통계청 주택총조사·인구총조사 (KOSIS)</span></div>
  <div class="navtitle">화면</div>
  <div class="nav" id="nav">
    <button class="navbtn active" data-v="overview">🏘️ 종류별 개요</button>
    <button class="navbtn" data-v="region">📍 지역별 순위·비교</button>
    <button class="navbtn" data-v="time">📈 시점별 추이</button>
    <button class="navbtn" data-v="area">📐 평형 (연면적)</button>
    <button class="navbtn" data-v="age">🏚️ 노후도 (건축연도)</button>
    <button class="navbtn" data-v="tenure">🔑 점유형태 (자가/전월세)</button>
    <button class="navbtn" data-v="supply">🏗️ 공급 (인허가·착공·준공)</button>
    <button class="navbtn" data-v="own">👤 주택소유 (다주택자)</button>
    <button class="navbtn" data-v="loan">💰 주택금융 (대출)</button>
  </div>
  <div class="navtitle">기준연도 <span style="color:var(--sub);">· 단일</span></div>
  <div class="chips" id="yearChips"></div>
  <div class="navtitle">지역 <span style="color:var(--sub);">· 다중(첫째=주지역)</span></div>
  <div class="chips" id="regionChips"></div>
  <div class="muted" id="foot" style="margin-top:auto;font-size:11px;line-height:1.7;padding-top:16px;"></div>
</aside>
<main class="main"><div class="wrap">
  <div class="shead"><h1 id="pageTitle">종류별 개요</h1></div>
  <div class="sub2" id="pageSub"></div>
  <div class="kpis" id="kpis"></div>
  <div class="insight" id="insight"></div>
  <div class="grid" id="grid"></div>
</div></main>
</div>

<script>
/* ===== 데이터 ===== */
const DEMO=(()=>{const R={'전국':19870,'서울특별시':3100,'경기도':4600,'부산광역시':1300};
 const S={아파트:.653,'단독주택':.193,'연립주택':.03,'다세대주택':.085,'비주거용 건물 내 주택':.039};
 const Y=['2015','2020','2024'],g={'2015':.86,'2020':.95,'2024':1},o=[];
 for(const[r,b]of Object.entries(R))for(const y of Y)for(const[t,f]of Object.entries(S))o.push({region:r,type:t,year:y,value:Math.round(b*1000*f*g[y])});return o;})();
const HD=(window.HOUSING_DATA&&window.HOUSING_DATA.length)?window.HOUSING_DATA:DEMO;
const TD=window.TENURE_DATA||[], AD=window.AREA_DATA||[], GD=window.AGE_DATA||[], SD=window.SUPPLY_DATA||[], OWND=window.OWN_DATA||[], CONC=window.CONC_DATA||[], TYD=window.TENURE_YR_DATA||[], LOAND=window.LOAN_DATA||[];
if(!(window.HOUSING_DATA&&window.HOUSING_DATA.length)) document.getElementById('demoBadge').style.display='inline-block';

/* ===== 상수/순서/색 ===== */
const TYPE_ORDER=['아파트','단독주택','연립주택','다세대주택','비주거용 건물 내 주택'];
const TYPE_COLORS={'아파트':'#6ba2ff','단독주택':'#46dcb2','연립주택':'#ffc066','다세대주택':'#f48fb1','비주거용 건물 내 주택':'#9b8cff'};
const BAND_ORDER=['20㎡이하','20㎡~40㎡','40㎡~60㎡','60㎡~85㎡','85㎡~100㎡','100㎡~130㎡','130㎡~165㎡','165㎡~230㎡','230㎡초과'];
const BAND_PY={'20㎡이하':'6평 이하','20㎡~40㎡':'6~12평','40㎡~60㎡':'12~18평','60㎡~85㎡':'18~26평','85㎡~100㎡':'26~30평','100㎡~130㎡':'30~39평','130㎡~165㎡':'39~50평','165㎡~230㎡':'50~70평','230㎡초과':'70평 초과'};
const bandLbl=b=>(state.areaUnit==='㎡')?b:(BAND_PY[b]||b);
const ERA_ORDER=['1979년 이전','1980년대','1990년대','2000년대','2010년대','2020년대'];
const ERA_COLORS={'1979년 이전':'#ef5350','1980년대':'#ff8a65','1990년대':'#ffc066','2000년대':'#9ccc65','2010년대':'#46dcb2','2020년대':'#6ba2ff'};
const TEN_ORDER=['자가','전세','보증부월세','무보증월세','사글세','무상'];
const TEN_COLORS={'자가':'#46dcb2','전세':'#6ba2ff','보증부월세':'#ffc066','무보증월세':'#ff8a65','사글세':'#f48fb1','무상':'#9aa7bd'};
const REGION_ORDER=['전국','서울특별시','부산광역시','대구광역시','인천광역시','광주광역시','대전광역시','울산광역시','세종특별자치시','경기도','강원도','충청북도','충청남도','전라북도','전라남도','경상북도','경상남도','제주도'];
const SEQ=['#1b3a6b','#235086','#2f6aa6','#4f8cc9','#6ba2ff','#8fbaf6','#46dcb2','#7fe6c9','#b8f0e0'];

/* ===== 유틸 ===== */
const fmt=n=>n==null?'-':Math.round(n).toLocaleString('ko-KR');
const uniq=a=>[...new Set(a)];
const sumW=(arr,pred)=>arr.reduce((s,r)=>s+(pred(r)?(r.value||0):0),0);
const orderBy=(arr,ord)=>[...arr].sort((a,b)=>{let x=ord.indexOf(a),y=ord.indexOf(b);if(x<0)x=99;if(y<0)y=99;return x-y;});
function regionsSorted(list){return [...list].sort((a,b)=>{let x=REGION_ORDER.indexOf(a),y=REGION_ORDER.indexOf(b);if(x<0)x=99;if(y<0)y=99;return x-y||a.localeCompare(b,'ko');});}
const ALL='전체';
const H_YEARS=uniq(HD.map(d=>d.year)).sort();
const AREA_YEARS=uniq(AD.map(d=>d.year)).sort();
const AGE_YEARS=uniq(GD.map(d=>d.year)).sort();
const TEN_YEARS=uniq(TD.map(d=>d.year)).sort();
const lastOf=a=>a[a.length-1];
const ALL_REGIONS=regionsSorted(uniq(HD.map(d=>d.region)));
function clampArea(y){y=+y;return String(Math.min(2024,Math.max(2015,y)));}
function nearestLE(years,y){y=+y;let best=years[0];for(const a of years)if(+a<=y)best=a;return best;}

/* ===== 상태 ===== */
const state={view:'overview',year:H_YEARS[H_YEARS.length-1],regions:['전국'],supMode:'year',supMeasure:'인허가',supTab:'trend',supRegView:'overlay',supType:'전체',ownBasis:'개인',ownTab:'compose',ownRegView:'trend',loanTab:'balance',tenTab:'type',timeTab:'type',timeType:'전체',areaUnit:'평',aptView:'%'};
const mainRegion=()=>state.regions[0]||'전국';
window.setSupMode=m=>{state.supMode=m;render();};
window.setSupMeasure=m=>{state.supMeasure=m;render();};
window.setSupTab=t=>{state.supTab=t;render();};
window.setSupRegView=v=>{state.supRegView=v;render();};
window.setSupType=t=>{state.supType=t;render();};
window.setOwnBasis=b=>{state.ownBasis=b;render();};
window.setOwnTab=t=>{state.ownTab=t;render();};
window.setOwnRegView=v=>{state.ownRegView=v;render();};
window.setTenTab=t=>{state.tenTab=t;render();};
window.setTimeTab=t=>{state.timeTab=t;render();};
window.setTimeType=t=>{state.timeType=t;render();};
window.setAreaUnit=u=>{state.areaUnit=u;render();};
window.setAptView=v=>{state.aptView=v;render();};
window.setLoanTab=t=>{state.loanTab=t;render();};
let charts={};
if(window.Chart){Chart.defaults.animation=false;   // 애니메이션 제거
  Chart.defaults.elements.line.tension=0;          // 직선 연결
  Chart.defaults.elements.point.radius=2.5;        // 점 표시
  Chart.defaults.elements.point.hoverRadius=5;}
function draw(id,cfg){if(charts[id])charts[id].destroy();const el=document.getElementById(id);if(el)charts[id]=new Chart(el,cfg);}
function baseOpts(extra){return Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}}},
  scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}}}},extra||{});}

/* ===== 사이드바 구성 ===== */
const navEl=document.getElementById('nav');
navEl.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>{state.view=b.dataset.v;
  navEl.querySelectorAll('.navbtn').forEach(x=>x.classList.toggle('active',x===b));render();});
function buildYearChips(){const c=document.getElementById('yearChips');c.innerHTML='';
  const mk=(val,label,extra)=>{const s=document.createElement('span');s.className='chip'+(val===state.year?' on':'')+(extra||'');s.textContent=label;
    s.onclick=()=>{state.year=val;buildYearChips();render();};c.appendChild(s);};
  mk(ALL,'전체',' all');
  H_YEARS.forEach(y=>mk(y,y));}
function buildRegionChips(){const c=document.getElementById('regionChips');c.innerHTML='';
  ALL_REGIONS.forEach(r=>{const s=document.createElement('span');
    s.className='chip'+(state.regions.includes(r)?' on':'')+(r==='전국'?' all':'');
    s.textContent=r==='전국'?'전국(전체)':r.replace(/특별시|광역시|특별자치시|특별자치도|도$/,'');
    s.title=r==='전국'?'전국 = 전체 선택/해제':r;
    s.onclick=()=>{
      if(r==='전국'){
        const allSel=ALL_REGIONS.every(x=>state.regions.includes(x));
        state.regions=allSel?[]:[...ALL_REGIONS];
      }else{
        const i=state.regions.indexOf(r);
        if(i>=0)state.regions.splice(i,1);else state.regions.push(r);
      }
      buildRegionChips();render();};
    c.appendChild(s);});}
document.getElementById('foot').innerHTML='출처: 통계청 주택총조사(주택수·평형·노후)<br>· 인구총조사(점유형태) · KOSIS<br>단위: 호 / 가구';

/* ===== 렌더 디스패치 ===== */
const TITLES={overview:'종류별 개요',region:'지역별 순위·비교',time:'시점별 추이',area:'평형 (연면적)',age:'노후도 (건축연도)',tenure:'점유형태 (자가/전월세)',supply:'공급 (인허가·착공·준공)',own:'주택소유 (다주택자)',loan:'주택금융 (대출)'};
function kpiHTML(items){return items.map(k=>`<div class="kpi"><div class="v">${k.v}${k.s?` <small>${k.s}</small>`:''}</div><div class="k">${k.k}</div></div>`).join('');}
function render(){
  try{localStorage.setItem('housingDash',JSON.stringify(state));}catch(e){}
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  document.getElementById('pageTitle').textContent=TITLES[state.view];
  const g=document.getElementById('grid');g.innerHTML='';
  ({overview:renderOverview,region:renderRegion,time:renderTime,area:renderArea,age:renderAge,tenure:renderTenure,supply:renderSupply,own:renderOwn,loan:renderLoan})[state.view]();
}
function setSub(t){document.getElementById('pageSub').textContent=t;}
function setInsight(html){document.getElementById('insight').innerHTML=html;}

/* ===== 1) 종류별 개요 ===== */
function renderOverview(){
  const region=mainRegion();
  const y=state.year===ALL?lastOf(H_YEARS):state.year;
  setSub(`${region} · ${state.year===ALL?`전체 → 최신 ${y}년`:`${y}년`} 기준 (재고는 시점 스냅샷)`);
  const ry=HD.filter(d=>d.region===region&&d.year===y);
  const types=orderBy(uniq(ry.map(d=>d.type)),TYPE_ORDER);
  const total=sumW(ry,()=>true);
  const v=t=>sumW(ry,d=>d.type===t);
  const apt=v('아파트'),single=v('단독주택');
  document.getElementById('kpis').innerHTML=kpiHTML([
    {k:`${region} ${y}년 총주택`,v:fmt(total),s:'호'},
    {k:'아파트',v:fmt(apt),s:`${total?(apt/total*100).toFixed(1):0}%`},
    {k:'단독주택',v:fmt(single),s:`${total?(single/total*100).toFixed(1):0}%`},
    {k:'주택 종류',v:types.length,s:'종'}]);
  setInsight(`${region} ${y}년 총주택은 <b>${fmt(total)}호</b>, 그중 아파트가 <b>${total?(apt/total*100).toFixed(1):0}%</b>로 가장 많습니다.`);
  document.getElementById('grid').innerHTML=`
    <div class="panel"><h3>종류별 구성</h3><div class="chartbox"><canvas id="cDonut"></canvas></div></div>
    <div class="panel"><h3>종류별 주택수</h3><div class="chartbox"><canvas id="cBar"></canvas></div></div>`;
  draw('cDonut',{type:'doughnut',data:{labels:types,datasets:[{data:types.map(v),backgroundColor:types.map(t=>TYPE_COLORS[t]),borderColor:'#1b2435',borderWidth:2}]},
    options:baseOpts({scales:{},plugins:{legend:{position:'right',labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmt(c.parsed)}호 (${(c.parsed/total*100).toFixed(1)}%)`}}}})});
  draw('cBar',{type:'bar',data:{labels:types,datasets:[{data:types.map(v),backgroundColor:types.map(t=>TYPE_COLORS[t])}]},
    options:baseOpts({plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fmt(c.parsed.y)}호`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{display:false}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
}

/* ===== 2) 지역별 순위·비교 ===== */
function renderRegion(){
  const y=state.year===ALL?lastOf(H_YEARS):state.year;
  setSub(`${state.year===ALL?`전체 → 최신 ${y}년`:`${y}년`} · 시도별 (선택 지역 강조)`);
  const sidos=ALL_REGIONS.filter(r=>r!=='전국');
  const tot=r=>sumW(HD,d=>d.region===r&&d.year===y);
  const pairs=sidos.map(r=>[r,tot(r)]).sort((a,b)=>b[1]-a[1]);
  const nat=tot('전국');
  document.getElementById('kpis').innerHTML=kpiHTML([
    {k:`전국 ${y}년 총주택`,v:fmt(nat),s:'호'},
    {k:'최다 시도',v:pairs[0][0].replace(/특별시|광역시|도$/,''),s:`${fmt(pairs[0][1])}호`},
    {k:'시도 수',v:pairs.length,s:'개'}]);
  setInsight(`${y}년 주택이 가장 많은 시도는 <b>${pairs[0][0]}</b> (${fmt(pairs[0][1])}호), 다음은 ${pairs[1][0]} 입니다.`);
  document.getElementById('grid').innerHTML=`
    <div class="panel full"><h3>시도별 총주택수 <span class="muted">(${y}년)</span></h3><div class="chartbox tall"><canvas id="cRank"></canvas></div></div>
    <div class="panel full"><h3>지역 × 종류 구성 <span class="muted">(100%)</span></h3><div class="chartbox tall"><canvas id="cMix"></canvas></div></div>`;
  const sel=state.regions;

/* ===== 3) 시점별 추이 ===== */
function renderTime(){
  const region=mainRegion();
  const tt=state.timeTab||'type';
  const types=orderBy(uniq(HD.map(d=>d.type)),TYPE_ORDER);
  const hv=(r,t,y)=>{const a=HD.filter(d=>d.region===r&&d.type===t&&d.year===y);return a.length?sumW(a,()=>true):null;};
  const htot=(r,y)=>{const a=HD.filter(d=>d.region===r&&d.year===y);return a.length?sumW(a,()=>true):null;};
  const TYMAP={전체:null,아파트:'아파트',단독:'단독주택',연립:'연립주택',다세대:'다세대주택',비주거용:'비주거용 건물 내 주택'};
  const sel=state.timeType||'전체';
  const typeSeg=`<span class="seg">${Object.keys(TYMAP).map(k=>`<button class="${sel===k?'on':''}" onclick="setTimeType('${k}')">${k}</button>`).join('')}</span>`;
  const toolbar=`<div style="grid-column:1/-1;margin-bottom:6px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;">
    <span class="seg"><button class="${tt==='type'?'on':''}" onclick="setTimeTab('type')">종류별 (한 지역)</button><button class="${tt==='region'?'on':''}" onclick="setTimeTab('region')">지역별 비교</button></span>${tt==='region'?typeSeg:''}</div>`;
  const cols=['#6ba2ff','#46dcb2','#ffc066','#f48fb1','#9b8cff','#ff8a65','#7fe6c9','#9aa7bd','#fb923c','#a78bfa'];

  if(tt==='region'){
    const ftype=TYMAP[sel];
    const getv=(r,y)=>ftype?hv(r,ftype,y):htot(r,y);
    const yr0=H_YEARS[0], yrN=lastOf(H_YEARS);
    const nat0=getv('전국',yr0), natN=getv('전국',yrN);
    setSub(`지역별 ${sel} 연도 추이 · ${yr0}~${yrN} · 지역 칩으로 여러 시도 겹쳐 비교`);
    document.getElementById('kpis').innerHTML=kpiHTML([
      {k:`전국 ${sel} ${yr0}`,v:fmt(nat0),s:'호'},
      {k:`전국 ${sel} ${yrN}`,v:fmt(natN),s:'호'},
      {k:'증가',v:nat0?`${(natN/nat0).toFixed(1)}배`:'-',s:''},
      {k:'비교 지역',v:state.regions.length,s:'곳'}]);
    setInsight(`선택한 지역들의 <b>${sel}</b> 주택수 추이를 ${yr0}~${yrN}로 겹쳐 비교합니다. 지역 칩에서 시도를 추가하세요. <span class="note">※단위 호 · 2015년부터 등록센서스 방식</span>`);
    document.getElementById('grid').innerHTML=toolbar+`<div class="panel full"><h3>지역별 ${sel} 추이 <span class="muted">(${yr0}~${yrN} · 호)</span></h3><div class="chartbox tall"><canvas id="cT2"></canvas></div></div>`;
    draw('cT2',{type:'line',data:{labels:H_YEARS,datasets:state.regions.map((r,i)=>({label:r,borderColor:cols[i%cols.length],backgroundColor:'transparent',spanGaps:true,data:H_YEARS.map(y=>getv(r,y))}))},
      options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y)}호`}}},
        scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
    return;
  }

  const apt75=hv(region,'아파트',H_YEARS[0]),apt24=hv(region,'아파트',lastOf(H_YEARS));
  setSub(`${region} 종류별 추이 · 전 기간 표시 · 여러 지역 비교는 '지역별 비교' 탭`);
  document.getElementById('kpis').innerHTML=kpiHTML([
    {k:`${region} 아파트 ${H_YEARS[0]}`,v:fmt(apt75),s:'호'},
    {k:`${region} 아파트 ${lastOf(H_YEARS)}`,v:fmt(apt24),s:'호'},
    {k:'아파트 증가',v:apt75?`${(apt24/apt75).toFixed(1)}배`:'-',s:''}]);
  setInsight(`${region} 아파트는 ${H_YEARS[0]}년 ${fmt(apt75)}호 → ${lastOf(H_YEARS)}년 <b>${fmt(apt24)}호</b>로 약 ${apt75?(apt24/apt75).toFixed(1):'-'}배 늘었습니다. <span class="note">※2015년부터 등록센서스 방식(2010↔2015 단절 가능)</span>`);
  document.getElementById('grid').innerHTML=toolbar+`<div class="panel full"><h3>${region} 종류별 추이 <span class="muted">(${H_YEARS[0]}~${lastOf(H_YEARS)})</span></h3><div class="chartbox tall"><canvas id="cT1"></canvas></div></div>`;
  draw('cT1',{type:'line',data:{labels:H_YEARS,datasets:types.map(t=>({label:t,borderColor:TYPE_COLORS[t],backgroundColor:'transparent',spanGaps:true,
      data:H_YEARS.map(y=>hv(region,t,y))}))},
    options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y)}호`}}},
      scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
}

/* ===== 4) 평형 (연면적) ===== */
function renderArea(){
  if(!AD.length){noData('평형(연면적)');return;}
  const region=mainRegion();
  const y=state.year===ALL?lastOf(AREA_YEARS):clampArea(state.year);
  setSub(`${region} · ${y}년 (연면적 자료 2015~2024)${state.year===ALL?' · 전체→최신':(y!==state.year?` · 선택 ${state.year}→${y}`:'')}`);
  const types=orderBy(uniq(AD.map(d=>d.type)),TYPE_ORDER);
  const av=(t,b)=>sumW(AD,d=>d.region===region&&d.year===y&&d.type===t&&d.band===b);
  const bandTot=b=>sumW(AD,d=>d.region===region&&d.year===y&&d.band===b);
  const total=sumW(AD,d=>d.region===region&&d.year===y);
  const small=BAND_ORDER.slice(0,4).reduce((s,b)=>s+bandTot(b),0); // 85㎡(약 26평) 이하
  const mid=bandTot('60㎡~85㎡');
  const py=state.areaUnit==='평';
  const lblSmall=py?'26평 이하(중소형)':'85㎡ 이하(중소형)', lblMid=py?'18~26평 비중':'60~85㎡ 비중';
  document.getElementById('kpis').innerHTML=kpiHTML([
    {k:`${region} ${y}년 주택`,v:fmt(total),s:'호'},
    {k:lblSmall,v:`${total?(small/total*100).toFixed(1):0}%`,s:fmt(small)+'호'},
    {k:lblMid,v:`${total?(mid/total*100).toFixed(1):0}%`,s:fmt(mid)+'호'}]);
  setInsight(`${region} 주택의 <b>${total?(small/total*100).toFixed(1):0}%</b>가 ${py?'26평':'85㎡'} 이하 중소형입니다. <span class="note">※1평=3.3058㎡ 환산(연면적 기준, 분양평형 아님)</span>`);
  const unitSeg=`<div style="grid-column:1/-1;margin-bottom:6px;"><span class="seg"><button class="${py?'on':''}" onclick="setAreaUnit('평')">평</button><button class="${py?'':'on'}" onclick="setAreaUnit('㎡')">㎡</button></span></div>`;
  document.getElementById('grid').innerHTML=unitSeg+`
    <div class="panel full"><h3>종류별 평형 구성 <span class="muted">(100%)</span></h3><div class="chartbox tall"><canvas id="cA1"></canvas></div></div>
    <div class="panel"><h3>전체 평형 분포 <span class="muted">(${region})</span></h3><div class="chartbox"><canvas id="cA2"></canvas></div></div>
    <div class="panel"><h3>평형 × 종류 (호)</h3><div class="tablewrap"><table id="cA3"></table></div></div>`;
  draw('cA1',{type:'bar',data:{labels:types,datasets:BAND_ORDER.map((b,i)=>({label:bandLbl(b),backgroundColor:SEQ[i%SEQ.length],
      data:types.map(t=>{const tt=sumW(AD,d=>d.region===region&&d.year===y&&d.type===t);const v=av(t,b);return tt?+(100*v/tt).toFixed(1):0;})}))},
    options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:11}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},
      scales:{x:{stacked:true,ticks:{color:'#c3cee0'},grid:{display:false}},y:{stacked:true,max:100,ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
  draw('cA2',{type:'doughnut',data:{labels:BAND_ORDER.map(bandLbl),datasets:[{data:BAND_ORDER.map(bandTot),backgroundColor:BAND_ORDER.map((b,i)=>SEQ[i%SEQ.length]),borderColor:'#1b2435',borderWidth:2}]},
    options:baseOpts({scales:{},plugins:{legend:{position:'right',labels:{color:'#c3cee0',boxWidth:11,font:{size:11}}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmt(c.parsed)}호 (${total?(c.parsed/total*100).toFixed(1):0}%)`}}}})});
  let head='<thead><tr><th>종류</th>'+BAND_ORDER.map(b=>`<th>${bandLbl(b)}</th>`).join('')+'<th>합계</th></tr></thead>';
  let body='<tbody>'+types.map(t=>{const cells=BAND_ORDER.map(b=>av(t,b));return `<tr><td>${t}</td>`+cells.map(v=>`<td>${fmt(v)}</td>`).join('')+`<td><b>${fmt(cells.reduce((a,b)=>a+b,0))}</b></td></tr>`;}).join('')+'</tbody>';
  document.getElementById('cA3').innerHTML=head+body;
}

/* ===== 5) 노후도 (건축연도) ===== */
function renderAge(){
  if(!GD.length){noData('노후도(건축연도)');return;}
  const region=mainRegion();
  const y=state.year===ALL?lastOf(AGE_YEARS):clampArea(state.year);
  setSub(`${region} · ${y}년 (건축연도 자료 2015~2024)${state.year===ALL?' · 전체→최신':(y!==state.year?` · 선택 ${state.year}→${y}`:'')}`);
  const types=orderBy(uniq(GD.map(d=>d.type)),TYPE_ORDER);
  const gv=(t,e)=>sumW(GD,d=>d.region===region&&d.year===y&&d.type===t&&d.era===e);
  const eraTot=e=>sumW(GD,d=>d.region===region&&d.year===y&&d.era===e);
  const total=sumW(GD,d=>d.region===region&&d.year===y);
  const old=['1979년 이전','1980년대','1990년대'].reduce((s,e)=>s+eraTot(e),0); // 2000년 이전
  const neu=['2010년대','2020년대'].reduce((s,e)=>s+eraTot(e),0);
  const aptOldT=sumW(GD,d=>d.region===region&&d.year===y&&d.type==='아파트');
  const aptOld=['1979년 이전','1980년대','1990년대'].reduce((s,e)=>s+sumW(GD,d=>d.region===region&&d.year===y&&d.type==='아파트'&&d.era===e),0);
  const sgOldT=sumW(GD,d=>d.region===region&&d.year===y&&d.type==='단독주택');
  const sgOld=['1979년 이전','1980년대','1990년대'].reduce((s,e)=>s+sumW(GD,d=>d.region===region&&d.year===y&&d.type==='단독주택'&&d.era===e),0);
  document.getElementById('kpis').innerHTML=kpiHTML([
    {k:`${region} ${y}년 주택`,v:fmt(total),s:'호'},
    {k:'2000년 이전 준공',v:`${total?(old/total*100).toFixed(1):0}%`,s:fmt(old)+'호'},
    {k:'2010년 이후(신축)',v:`${total?(neu/total*100).toFixed(1):0}%`,s:fmt(neu)+'호'}]);
  setInsight(`2000년 이전 준공 비율: 단독주택 <b>${sgOldT?(sgOld/sgOldT*100).toFixed(1):0}%</b> vs 아파트 <b>${aptOldT?(aptOld/aptOldT*100).toFixed(1):0}%</b> — 단독주택이 훨씬 노후했습니다.`);
  document.getElementById('grid').innerHTML=`
    <div class="panel full"><h3>종류별 건축연도(시대) 구성 <span class="muted">(100%)</span></h3><div class="chartbox tall"><canvas id="cG1"></canvas></div></div>
    <div class="panel"><h3>전체 건축연도 분포 <span class="muted">(${region})</span></h3><div class="chartbox"><canvas id="cG2"></canvas></div></div>
    <div class="panel"><h3>시대 × 종류 (호)</h3><div class="tablewrap"><table id="cG3"></table></div></div>`;
  draw('cG1',{type:'bar',data:{labels:types,datasets:ERA_ORDER.map(e=>({label:e,backgroundColor:ERA_COLORS[e],
      data:types.map(t=>{const tt=sumW(GD,d=>d.region===region&&d.year===y&&d.type===t);const v=gv(t,e);return tt?+(100*v/tt).toFixed(1):0;})}))},
    options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:11}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},
      scales:{x:{stacked:true,ticks:{color:'#c3cee0'},grid:{display:false}},y:{stacked:true,max:100,ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
  draw('cG2',{type:'doughnut',data:{labels:ERA_ORDER,datasets:[{data:ERA_ORDER.map(eraTot),backgroundColor:ERA_ORDER.map(e=>ERA_COLORS[e]),borderColor:'#1b2435',borderWidth:2}]},
    options:baseOpts({scales:{},plugins:{legend:{position:'right',labels:{color:'#c3cee0',boxWidth:11}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmt(c.parsed)}호 (${total?(c.parsed/total*100).toFixed(1):0}%)`}}}})});
  let head='<thead><tr><th>종류</th>'+ERA_ORDER.map(e=>`<th>${e}</th>`).join('')+'<th>합계</th></tr></thead>';
  let body='<tbody>'+types.map(t=>{const cells=ERA_ORDER.map(e=>gv(t,e));return `<tr><td>${t}</td>`+cells.map(v=>`<td>${fmt(v)}</td>`).join('')+`<td><b>${fmt(cells.reduce((a,b)=>a+b,0))}</b></td></tr>`;}).join('')+'</tbody>';
  document.getElementById('cG3').innerHTML=head+body;
}

/* ===== 6) 점유형태 ===== */
function renderTenure(){
  const region=mainRegion();
  const tt=state.tenTab||'type';
  const toolbar=`<div style="grid-column:1/-1;margin-bottom:6px;"><span class="seg">
    <button class="${tt==='type'?'on':''}" onclick="setTenTab('type')">종류별 (5년)</button>
    <button class="${tt==='yearly'?'on':''}" onclick="setTenTab('yearly')">매년 추이</button></span>
    <span class="muted" style="margin-left:8px;font-size:11.5px;">${tt==='type'?'인구총조사 5년 · 거처종류별':'주거실태조사 매년 · 시도별'}</span></div>`;
  if(tt==='yearly'){
    if(!TYD.length){noData('매년 점유형태(주거실태조사)');return;}
    const yyears=uniq(TYD.map(d=>d.year)).sort();
    const yy=state.year===ALL?lastOf(yyears):(yyears.includes(state.year)?state.year:nearestLE(yyears,state.year));
    const yv=(reg,yr,tn)=>{const r=TYD.find(d=>d.region===reg&&d.year===yr&&d.tenure===tn);return r?r.value:null;};
    const own=yv(region,yy,'자가'), rent=yv(region,yy,'임차'), free=yv(region,yy,'무상');
    const a0=yv(region,yyears[0],'자가'), aN=yv(region,lastOf(yyears),'자가');
    setSub(`${region} · ${yy}년 · 주거실태조사(국토부) 매년 · 자가/임차/무상 점유율(%) · 자료 ${yyears[0]}~${lastOf(yyears)}`);
    document.getElementById('kpis').innerHTML=kpiHTML([
      {k:`${region} ${yy}년 자가점유율`,v:`${own!=null?own.toFixed(1):'-'}`,s:'%'},
      {k:'임차',v:`${rent!=null?rent.toFixed(1):'-'}`,s:'%'},
      {k:'무상',v:`${free!=null?free.toFixed(1):'-'}`,s:'%'},
      {k:'자가율 변화',v:`${(a0!=null&&aN!=null)?((aN-a0>=0?'+':'')+(aN-a0).toFixed(1)):'-'}`,s:`%p (${yyears[0]}→${lastOf(yyears)})`}]);
    setInsight(`${region} ${yy}년 자가점유율 <b>${own!=null?own.toFixed(1):'-'}%</b> · 임차 <b>${rent!=null?rent.toFixed(1):'-'}%</b>. <span class="note">※주거실태조사 표본 · 전세/월세는 '임차'로 합산 · 종류별(아파트 등)은 '종류별(5년)' 탭</span>`);
    document.getElementById('grid').innerHTML=toolbar+`
      <div class="panel full"><h3>자가점유율 매년 추이 <span class="muted">(지역 칩으로 겹쳐 비교)</span></h3><div class="chartbox tall"><canvas id="cN5"></canvas></div></div>
      <div class="panel full"><h3>${region} 점유형태 구성 추이 <span class="muted">(자가/임차/무상 %)</span></h3><div class="chartbox tall"><canvas id="cN6"></canvas></div></div>`;
    const cols=['#6ba2ff','#46dcb2','#ffc066','#f472b6','#9b8cff','#ff8a65','#7fe6c9','#9aa7bd','#fb923c','#a78bfa'];
    draw('cN5',{type:'line',data:{labels:yyears,datasets:state.regions.map((r,i)=>({label:r,borderColor:cols[i%cols.length],backgroundColor:'transparent',spanGaps:true,data:yyears.map(yr=>yv(r,yr,'자가'))}))},
      options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
    const TO=['자가','임차','무상'], TC={'자가':'#46dcb2','임차':'#6ba2ff','무상':'#9aa7bd'};
    draw('cN6',{type:'bar',data:{labels:yyears,datasets:TO.map(tn=>({label:tn,backgroundColor:TC[tn],data:yyears.map(yr=>yv(region,yr,tn))}))},
      options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},scales:{x:{stacked:true,ticks:{color:'#c3cee0'},grid:{display:false}},y:{stacked:true,max:100,ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
    return;
  }
  if(!TD.length){noData('점유형태(자가/전월세)');return;}
  const y=state.year===ALL?lastOf(TEN_YEARS):nearestLE(TEN_YEARS,state.year);
  setSub(`${region} · ${y}년 · 가구 기준 (인구총조사 5년주기 ${TEN_YEARS.join('·')})${state.year===ALL?' · 전체→최신':(y!==state.year?` · 선택 ${state.year}→${y}`:'')}`);
  const htypes=orderBy(uniq(TD.map(d=>d.htype)),TYPE_ORDER);
  const tv=(h,t)=>{const r=TD.find(d=>d.region===region&&d.htype===h&&d.year===y&&d.tenure===t);return r?r.value:null;};
  const totalHH=htypes.reduce((s,h)=>s+(tv(h,'합계')||0),0);

    {k:'자가 가구',v:fmt(ownHH),s:'가구'},
    {k:'임차 등',v:fmt(totalHH-ownHH),s:`${totalHH?((totalHH-ownHH)/totalHH*100).toFixed(1):0}%`}]);
  const aRate=(h)=>{const t=tv(h,'합계'),o=tv(h,'자가');return t?o/t*100:0;};
  setInsight(`${region} ${y}년 자가 점유율은 아파트 <b>${aRate('아파트').toFixed(1)}%</b>, 단독주택 <b>${aRate('단독주택').toFixed(1)}%</b> 입니다. (빈집 제외, 거주가구 기준)`);

    <div class="panel full"><h3>자가율 추이 <span class="muted">(${TEN_YEARS.join('·')})</span></h3><div class="chartbox"><canvas id="cN3"></canvas></div></div>
    <div class="panel full"><h3>상세표 <span class="muted">(가구수)</span></h3><div class="tablewrap"><table id="cN4"></table></div></div>`;
  draw('cN1',{type:'bar',data:{labels:htypes,datasets:[{data:htypes.map(h=>+aRate(h).toFixed(1)),backgroundColor:htypes.map(h=>TYPE_COLORS[h])}]},
    options:baseOpts({plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` 자가율 ${c.parsed.y}%`}}},

  draw('cN2',{type:'bar',data:{labels:htypes,datasets:TEN_ORDER.map(tn=>({label:tn,backgroundColor:TEN_COLORS[tn],
      data:htypes.map(h=>{const t=tv(h,'합계'),v=tv(h,tn);return t?+(100*(v||0)/t).toFixed(1):0;})}))},
    options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:11}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},
      scales:{x:{stacked:true,ticks:{color:'#c3cee0'},grid:{display:false}},y:{stacked:true,max:100,ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
  draw('cN3',{type:'line',data:{labels:TEN_YEARS,datasets:htypes.map(h=>({label:h,borderColor:TYPE_COLORS[h],backgroundColor:'transparent',tension:0,
      data:TEN_YEARS.map(yy=>{const r=TD.find(d=>d.region===region&&d.htype===h&&d.year===yy&&d.tenure==='합계');const o=TD.find(d=>d.region===region&&d.htype===h&&d.year===yy&&d.tenure==='자가');return (r&&r.value)?+(o.value/r.value*100).toFixed(1):null;})}))},
    options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:11}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},
      scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
  const cols=['합계',...TEN_ORDER];
  let head='<thead><tr><th>종류</th>'+cols.map(c=>`<th>${c}</th>`).join('')+'<th>자가율</th></tr></thead>';
  let body='<tbody>'+htypes.map(h=>{const cells=cols.map(c=>tv(h,c));const t=tv(h,'합계'),o=tv(h,'자가');
    return `<tr><td>${h}</td>`+cells.map(v=>`<td>${fmt(v)}</td>`).join('')+`<td><b>${t?(o/t*100).toFixed(1):'-'}%</b></td></tr>`;}).join('')+'</tbody>';
  document.getElementById('cN4').innerHTML=head+body;
}

/* ===== 7) 공급 (인허가·착공·준공) ===== */
const MEAS=['인허가','착공','준공'];

let _sAnn=null,_sMon=null;
function supAnnual(){if(_sAnn)return _sAnn;_sAnn=new Map();for(const d of SD){const k=d.measure+'|'+d.region+'|'+d.type+'|'+(d.ym||'').slice(0,4);_sAnn.set(k,(_sAnn.get(k)||0)+(d.value||0));}return _sAnn;}
function supMonth(){if(_sMon)return _sMon;_sMon=new Map();for(const d of SD)_sMon.set(d.measure+'|'+d.region+'|'+d.type+'|'+d.ym,d.value);return _sMon;}
function renderSupply(){
  if(!SD.length){noData('공급(인허가·착공·준공)');return;}
  const region=mainRegion();
  const isAll=state.year===ALL;
  const SUP_YEARS=[];for(let y=2011;y<=2025;y++)SUP_YEARS.push(String(y));

  const yLabel=isAll?'2011~2025 누계':`${yFull}년`;
  setSub(`${region} · 국토부 주택건설실적 · 월별 2011.01~2026.03 · 연합계 ${yLabel}`);
  const months=[...new Set(SD.map(d=>d.ym))].sort();
  const AN=supAnnual(), MO=supMonth();
  const sv=(m,yr,typ)=>AN.get(`${m}|${region}|${typ||'전체'}|${yr}`)||0;
  const agg=(m,typ)=>isAll?SUP_YEARS.reduce((s,y)=>s+sv(m,y,typ),0):sv(m,yFull,typ);
  const mv=(m,ym)=>{const v=MO.get(`${m}|${region}|전체|${ym}`);return v==null?null:v;};
  const ph=agg('인허가'),pc=agg('착공'),pj=agg('준공');
  document.getElementById('kpis').innerHTML=kpiHTML([
    {k:`${region} ${yLabel} 인허가`,v:fmt(ph),s:'호'},
    {k:'착공',v:fmt(pc),s:'호'},
    {k:'준공',v:fmt(pj),s:'호'},
    {k:'착공/인허가',v:ph?`${(pc/ph*100).toFixed(0)}%`:'-',s:''}]);
  setInsight(`${region} ${yLabel} — 인허가 <b>${fmt(ph)}</b> · 착공 <b>${fmt(pc)}</b> · 준공 <b>${fmt(pj)}</b>호. <span class="note">※인허가는 월별누계를 월 증분으로 환산 · 단위는 호(가구)</span>`);
  const isMonth=state.supMode==='month';
  const meas=state.supMeasure;
  const tab=state.supTab||'trend';
  const aggReg=(m,reg)=>isAll?SUP_YEARS.reduce((s,y)=>s+(AN.get(`${m}|${reg}|전체|${y}`)||0),0):(AN.get(`${m}|${reg}|전체|${yFull}`)||0);
  const styp=state.supType||'전체';
  const tv=(m,r,y)=>styp==='빌라'?((AN.get(`${m}|${r}|연립|${y}`)||0)+(AN.get(`${m}|${r}|다세대|${y}`)||0)):(AN.get(`${m}|${r}|${styp}|${y}`)||0);
  const STYP_SEG=`<span class="seg">${['전체','아파트','빌라','단독'].map(t=>`<button class="${styp===t?'on':''}" onclick="setSupType('${t}')">${t}</button>`).join('')}</span>`;
  const subbar=`<div style="grid-column:1/-1;margin:-2px 0 6px;"><span class="seg">
      <button class="${tab==='trend'?'on':''}" onclick="setSupTab('trend')">추세</button>
      <button class="${tab==='region'?'on':''}" onclick="setSupTab('region')">시도별</button>
      <button class="${tab==='type'?'on':''}" onclick="setSupTab('type')">유형·표</button></span></div>`;
  let panels='';
  if(tab==='trend'){
    panels=`<div class="panel full"><h3>공급 추이 <span class="muted">(${region})</span>
      <span class="seg" style="margin-left:8px;">
        <button class="${isMonth?'':'on'}" onclick="setSupMode('year')">연도별</button>
        <button class="${isMonth?'on':''}" onclick="setSupMode('month')">월별</button></span></h3>
      <div class="chartbox tall"><canvas id="cS1"></canvas></div></div>`;
  }else if(tab==='region'){
    const rv=state.supRegView;
    const toolbar=`<div style="grid-column:1/-1;margin-bottom:6px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
      <span class="seg"><button class="${rv==='overlay'?'on':''}" onclick="setSupRegView('overlay')">겹쳐보기</button><button class="${rv==='multi'?'on':''}" onclick="setSupRegView('multi')">개별</button></span>${rv==='overlay'?`<span class="seg"><button class="${meas==='인허가'?'on':''}" onclick="setSupMeasure('인허가')">인허가</button><button class="${meas==='착공'?'on':''}" onclick="setSupMeasure('착공')">착공</button><button class="${meas==='준공'?'on':''}" onclick="setSupMeasure('준공')">준공</button></span>`:''}${STYP_SEG}<span class="muted" style="font-size:11.5px;">빌라=연립+다세대</span></div>`;
    if(rv==='overlay'){
      panels=toolbar+`<div class="panel full"><h3>시도별 ${meas} 추이 — ${styp} <span class="muted">(연도별 · 지역 칩으로 여러 시도 겹쳐 비교)</span></h3><div class="chartbox tall"><canvas id="cS5"></canvas></div></div>`;
    }else{

        +`<div style="grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;">`
        +sidos.map((r,i)=>{const sel=state.regions.includes(r);
          return `<div class="panel" style="padding:12px 14px;${sel?'border-color:#ffc066;':''}"><h3 style="font-size:14px;margin-bottom:8px;">${r.replace(/특별시|광역시|특별자치시|특별자치도|도$/,'')}${sel?' ★':''}</h3><div style="position:relative;height:185px;"><canvas id="cSR${i}"></canvas></div></div>`;}).join('')
        +`</div>`;
    }
  }else{
    panels=`<div class="panel"><h3>${yLabel} 유형별 착공 <span class="muted">(${region})</span></h3><div class="chartbox"><canvas id="cS3"></canvas></div></div>
      <div class="panel"><h3>연도별 합계 (호)</h3><div class="tablewrap"><table id="cS4"></table></div></div>`;
  }
  document.getElementById('grid').innerHTML=subbar+panels;
  if(tab==='trend'){
    if(isMonth){
      draw('cS1',{type:'line',data:{labels:months,datasets:MEAS.map(m=>({label:m,borderColor:MEAS_C[m],backgroundColor:'transparent',pointRadius:0,borderWidth:1.4,tension:0,spanGaps:true,data:months.map(ym=>mv(m,ym))}))},
        options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y)}호`}}},
          scales:{x:{ticks:{color:'#c3cee0',maxTicksLimit:16},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
    }else{
      draw('cS1',{type:'bar',data:{labels:SUP_YEARS,datasets:MEAS.map(m=>({label:m,backgroundColor:MEAS_C[m],data:SUP_YEARS.map(y=>sv(m,y))}))},
        options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y)}호`}}},
          scales:{x:{ticks:{color:'#c3cee0'},grid:{display:false}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
    }
  }else if(tab==='region'){
    if(state.supRegView==='overlay'){
      const cols=['#6ba2ff','#46dcb2','#ffc066','#f48fb1','#9b8cff','#ff8a65','#7fe6c9','#9aa7bd','#fb923c','#a78bfa'];
      draw('cS5',{type:'line',data:{labels:SUP_YEARS,datasets:state.regions.map((r,i)=>({label:r,borderColor:cols[i%cols.length],backgroundColor:'transparent',tension:0,pointRadius:2,borderWidth:2,data:SUP_YEARS.map(y=>tv(meas,r,y))}))},
        options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y)}호`}}},
          scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
    }else{

/* ===== 8) 주택소유 (다주택자) ===== */
function renderOwn(){
  if(!OWND.length){noData('주택소유(다주택자)');return;}
  const tab=state.ownTab||'compose', apt=tab==='apt', conc=tab==='conc', indiv=apt||conc;
  const basis=indiv?'개인':state.ownBasis, region=apt?'전국':mainRegion(), unit=basis==='개인'?'명':'가구';
  const years=uniq(OWND.filter(d=>d.basis===basis).map(d=>d.year)).sort();
  const y=state.year===ALL?lastOf(years):(years.includes(state.year)?state.year:nearestLE(years,state.year));
  const ORD=basis==='개인'?['1채','2채','3채 이상']:['1채','2채','3채','4채','5채이상'];
  const ov=(bs,reg,yy,b)=>{const r=OWND.find(d=>d.basis===bs&&d.region===reg&&d.year===yy&&d.band===b);return r?(r.value||0):0;};
  const rate=(bs,reg,yy)=>{const t=ov(bs,reg,yy,'총계');return t?+((t-ov(bs,reg,yy,'1채'))/t*100).toFixed(1):null;};
  const toolbar=`<div style="grid-column:1/-1;margin-bottom:6px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;">
    <span class="seg"><button class="${state.ownBasis==='개인'?'on':''}"${indiv?' style="opacity:.45"':''} onclick="setOwnBasis('개인')">개인</button><button class="${state.ownBasis==='가구'?'on':''}"${indiv?' style="opacity:.45"':''} onclick="setOwnBasis('가구')">가구</button></span>
    <span class="seg"><button class="${tab==='compose'?'on':''}" onclick="setOwnTab('compose')">구성·추이</button><button class="${tab==='region'?'on':''}" onclick="setOwnTab('region')">시도별</button><button class="${tab==='conc'?'on':''}" onclick="setOwnTab('conc')">📊 집중도</button><button class="${tab==='apt'?'on':''}" onclick="setOwnTab('apt')">🏢 아파트</button><button class="${tab==='table'?'on':''}" onclick="setOwnTab('table')">표</button></span>${indiv?'<span class="muted" style="font-size:11.5px;">· 이 탭은 개인 고정</span>':''}</div>`;

  if(conc){
    if(!CONC.length){noData('소유 집중도');return;}
    const cyears=uniq(CONC.map(d=>d.year)).sort();
    const yc=state.year===ALL?lastOf(cyears):(cyears.includes(state.year)?state.year:nearestLE(cyears,state.year));
    const cv=(reg,yy,m)=>{const r=CONC.find(d=>d.region===reg&&d.year===yy&&d.metric===m);return r?(r.value||0):0;};
    const ownerR=(reg,yy)=>{const t=ov('개인',reg,yy,'총계');return t?+((t-ov('개인',reg,yy,'1채'))/t*100).toFixed(1):null;};
    const homeR=(reg,yy)=>{const h=cv(reg,yy,'개인소유주택');return h?+((h-ov('개인',reg,yy,'1채'))/h*100).toFixed(1):null;};
    const orate=ownerR(region,yc), hrate=homeR(region,yc), avg=cv(region,yc,'평균'), homes=cv(region,yc,'개인소유주택');
    const multiHomes=homes-ov('개인',region,yc,'1채');
    setSub(`${region} · ${yc}년 · 개인·거주지역 기준 · 소유 집중도 (자료 ${cyears[0]}~${cyears[cyears.length-1]})`);
    document.getElementById('kpis').innerHTML=kpiHTML([
      {k:'다주택자 보유 주택수',v:fmt(multiHomes),s:`호 (${hrate}%)`},
      {k:'다주택 소유자 비율',v:`${orate}`,s:'% (사람)'},
      {k:'1인당 평균 소유주택',v:avg.toFixed(2),s:'채'},
      {k:`${region} 개인소유주택`,v:fmt(homes),s:'호'}]);
    setInsight(`${region} ${yc}년 다주택자는 소유자의 <b>${orate}%</b>지만 개인소유주택의 <b>${hrate}%</b>를 보유합니다. 주택 점유율이 사람 비율보다 높을수록 소유가 집중된 것입니다. <span class="note">※개인·거주지역 기준 (공동소유로 약간의 오차 가능)</span>`);
    document.getElementById('grid').innerHTML=toolbar+`
      <div class="panel full"><h3>다주택 비율 — 소유자 vs 주택 <span class="muted">(${region}, ${cyears[0]}~${cyears[cyears.length-1]})</span></h3><div class="chartbox tall"><canvas id="cO8"></canvas></div></div>
      <div class="panel full"><h3>1인당 평균 소유 주택수 추이 <span class="muted">(지역 칩으로 겹쳐 비교)</span></h3><div class="chartbox tall"><canvas id="cO9"></canvas></div></div>`;
    draw('cO8',{type:'line',data:{labels:cyears,datasets:[
      {label:'소유자 기준',borderColor:'#6ba2ff',backgroundColor:'transparent',data:cyears.map(yy=>ownerR(region,yy))},
      {label:'보유 주택 기준',borderColor:'#ffc066',backgroundColor:'transparent',data:cyears.map(yy=>homeR(region,yy))}]},
      options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
    const cols=['#6ba2ff','#46dcb2','#ffc066','#f48fb1','#9b8cff','#ff8a65','#7fe6c9','#9aa7bd','#fb923c','#a78bfa'];
    draw('cO9',{type:'line',data:{labels:cyears,datasets:state.regions.map((r,i)=>({label:r,borderColor:cols[i%cols.length],backgroundColor:'transparent',data:cyears.map(yy=>cv(r,yy,'평균')||null)}))},
      options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}채`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>v+'채'},grid:{color:'#28324a'}}}})});
    return;
  }

  if(apt){   // 전국·개인 — 전체 주택 vs 아파트
    const tA=ov('개인','전국',y,'총계'), mA=tA-ov('개인','전국',y,'1채');
    const tP=ov('아파트','전국',y,'총계'), mP=tP-ov('아파트','전국',y,'1채');
    const UM={'1채':1,'2채':2,'3채 이상':3};   // 보유 채수 환산(3채이상=최소 3채)
    const units=bs=>2*ov(bs,'전국',y,'2채')+3*ov(bs,'전국',y,'3채 이상');
    const aptUnits=units('아파트'), allUnits=units('개인'), av2=state.aptView||'%';
    setSub(`전국 · ${y}년 · 개인 기준 · 전체 주택 vs 아파트 (지역 구분 없는 전국 통계)`);
    document.getElementById('kpis').innerHTML=kpiHTML([
      {k:'다주택 아파트 소유자',v:fmt(mP),s:`${tP?(mP/tP*100).toFixed(1):0}% · 사람`},
      {k:'다주택 보유 아파트',v:fmt(aptUnits),s:'채 (최소)'},
      {k:'다주택 보유 주택(전체)',v:fmt(allUnits),s:'채 (최소)'},
      {k:'아파트 다주택 비중',v:mA?`${(mP/mA*100).toFixed(0)}%`:'-',s:'전체 다주택 중'}]);
    setInsight(`전국 ${y}년 다주택자(아파트 2채+)가 보유한 아파트는 <b>약 ${fmt(aptUnits)}채</b>(최소). 다주택률은 전체 <b>${tA?(mA/tA*100).toFixed(1):0}%</b> vs 아파트 <b>${tP?(mP/tP*100).toFixed(1):0}%</b>. <span class="note">※채수=2채×2+3채이상×3(최소) 환산 · 전국·개인</span>`);
    document.getElementById('grid').innerHTML=toolbar+`
      <div class="panel full"><h3>다주택률 추이 — 전체 vs 아파트 <span class="muted">(전국·개인)</span></h3><div class="chartbox tall"><canvas id="cO5"></canvas></div></div>
      <div class="panel full"><h3>소유 건수별 ${av2==='채'?'보유 채수':'소유자 비율'} <span class="muted">(${y}년)</span>
        <span class="seg" style="margin-left:8px;"><button class="${av2==='%'?'on':''}" onclick="setAptView('%')">비율 %</button><button class="${av2==='채'?'on':''}" onclick="setAptView('채')">보유 채수</button></span></h3>
        <div class="chartbox"><canvas id="cO6"></canvas></div></div>`;
    draw('cO5',{type:'line',data:{labels:years,datasets:[
      {label:'전체 주택',borderColor:'#6ba2ff',backgroundColor:'transparent',data:years.map(yy=>rate('개인','전국',yy))},
      {label:'아파트',borderColor:'#46dcb2',backgroundColor:'transparent',data:years.map(yy=>rate('아파트','전국',yy))}]},
      options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
    const BB=['1채','2채','3채 이상'];
    if(av2==='채'){
      draw('cO6',{type:'bar',data:{labels:BB,datasets:[
        {label:'전체 주택',backgroundColor:'#6ba2ff',data:BB.map(b=>UM[b]*ov('개인','전국',y,b))},
        {label:'아파트',backgroundColor:'#46dcb2',data:BB.map(b=>UM[b]*ov('아파트','전국',y,b))}]},
        options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.parsed.y)}채${c.label==='3채 이상'?'(최소)':''}`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{display:false}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
    }else{
      draw('cO6',{type:'bar',data:{labels:BB,datasets:[
        {label:'전체 주택',backgroundColor:'#6ba2ff',data:BB.map(b=>tA?+(ov('개인','전국',y,b)/tA*100).toFixed(1):0)},
        {label:'아파트',backgroundColor:'#46dcb2',data:BB.map(b=>tP?+(ov('아파트','전국',y,b)/tP*100).toFixed(1):0)}]},
        options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{display:false}},y:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
    }
    return;
  }

  const total=ov(basis,region,y,'총계')||ORD.reduce((s,b)=>s+ov(basis,region,y,b),0);
  const one=ov(basis,region,y,'1채'), multi=total-one, r2=total?multi/total*100:0;
  setSub(`${region} · ${y}년 · ${basis} 기준${state.year===ALL?' (전체→최신)':''} · 다주택 비율 = 2채 이상 소유 ${basis} 비율(사람 수 기준)`);
  document.getElementById('kpis').innerHTML=kpiHTML([
    {k:`${region} ${y}년 소유 ${basis}`,v:fmt(total),s:unit},
    {k:`다주택(2채+) · ${basis} 소유자`,v:fmt(multi),s:`${r2.toFixed(1)}%`},
    {k:'1채',v:fmt(one),s:`${total?(one/total*100).toFixed(1):0}%`},
    {k:'3채 이상',v:fmt(basis==='개인'?ov(basis,region,y,'3채 이상'):ov(basis,region,y,'3채')+ov(basis,region,y,'4채')+ov(basis,region,y,'5채이상')),s:''}]);
  setInsight(`${region} ${y}년 ${basis} 기준 다주택(2채 이상)은 <b>${fmt(multi)}${unit}</b>로 전체 소유 ${basis}의 <b>${r2.toFixed(1)}%</b> <b>(사람/가구 수 기준)</b>. <span class="note">※ '주택 수' 기준 보유 비율은 📊집중도 탭 · 아파트만은 🏢아파트 탭 · 매물 아님</span>`);
  let panels='';
  if(tab==='compose'){
    panels=`<div class="panel"><h3>소유 건수별 구성 <span class="muted">(${region} ${y}년)</span></h3><div class="chartbox"><canvas id="cO1"></canvas></div></div>
      <div class="panel"><h3>다주택 비율 추이 <span class="muted">(${region} · ${basis}·소유자 기준)</span></h3><div class="chartbox"><canvas id="cO2"></canvas></div></div>`;
  }else if(tab==='region'){
    const rv=state.ownRegView||'trend';
    const seg=`<div style="grid-column:1/-1;margin-bottom:4px;"><span class="seg"><button class="${rv==='trend'?'on':''}" onclick="setOwnRegView('trend')">연도추이</button><button class="${rv==='rank'?'on':''}" onclick="setOwnRegView('rank')">순위(${y}년)</button></span></div>`;
    panels=seg+(rv==='rank'
      ?`<div class="panel full"><h3>시도별 다주택 비율 <span class="muted">(${y}년 · ${basis}·소유자 기준 · 선택 강조)</span></h3><div class="chartbox tall"><canvas id="cO3"></canvas></div></div>`
      :`<div class="panel full"><h3>시도별 다주택 비율 추이 <span class="muted">(${basis}·소유자 기준 · 지역 칩으로 겹쳐 비교)</span></h3><div class="chartbox tall"><canvas id="cO7"></canvas></div></div>`);
  }else{
    panels=`<div class="panel full"><h3>시도 × 소유건수 <span class="muted">(${y}년 · ${unit})</span></h3><div class="tablewrap"><table id="cO4"></table></div></div>`;
  }
  document.getElementById('grid').innerHTML=toolbar+panels;
  if(tab==='compose'){
    draw('cO1',{type:'doughnut',data:{labels:ORD,datasets:[{data:ORD.map(b=>ov(basis,region,y,b)),backgroundColor:SEQ,borderColor:'#1b2435',borderWidth:2}]},
      options:baseOpts({scales:{},plugins:{legend:{position:'right',labels:{color:'#c3cee0',boxWidth:11}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmt(c.parsed)}${unit} (${total?(c.parsed/total*100).toFixed(1):0}%)`}}}})});
    draw('cO2',{type:'line',data:{labels:years,datasets:[{label:'다주택 비율',borderColor:'#ffc066',backgroundColor:'transparent',data:years.map(yy=>rate(basis,region,yy))}]},
      options:baseOpts({plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.y}%`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
  }else if(tab==='region'){
    if((state.ownRegView||'trend')==='rank'){
      const sidos=ALL_REGIONS.filter(r=>r!=='전국');
      const rp=sidos.map(r=>[r,rate(basis,r,y)||0]).sort((a,b)=>b[1]-a[1]);
      draw('cO3',{type:'bar',data:{labels:rp.map(p=>p[0].replace(/특별시|광역시|특별자치시|특별자치도|도$/,'')),datasets:[{data:rp.map(p=>p[1]),backgroundColor:rp.map(p=>state.regions.includes(p[0])?'#ffc066':'#6ba2ff')}]},
        options:baseOpts({indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` 다주택 ${c.parsed.x}%`}}},scales:{x:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0'},grid:{display:false}}}})});
    }else{
      const cols=['#6ba2ff','#46dcb2','#ffc066','#f48fb1','#9b8cff','#ff8a65','#7fe6c9','#9aa7bd','#fb923c','#a78bfa'];
      draw('cO7',{type:'line',data:{labels:years,datasets:state.regions.map((r,i)=>({label:r,borderColor:cols[i%cols.length],backgroundColor:'transparent',data:years.map(yy=>rate(basis,r,yy))}))},
        options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
    }
  }else{
    const cols=['총계',...ORD];
    let head='<thead><tr><th>지역</th>'+cols.map(c=>`<th>${c}</th>`).join('')+'<th>다주택%<br><small>(소유자)</small></th></tr></thead>';
    let body='<tbody>'+ALL_REGIONS.map(r=>{const t=ov(basis,r,y,'총계');
      return `<tr><td>${r}</td>`+cols.map(b=>`<td>${fmt(ov(basis,r,y,b))}</td>`).join('')+`<td><b>${t?((t-ov(basis,r,y,'1채'))/t*100).toFixed(1):'-'}%</b></td></tr>`;}).join('')+'</tbody>';
    document.getElementById('cO4').innerHTML=head+body;
  }
}

/* ===== 9) 주택금융 (대출) ===== */
function renderLoan(){
  if(!LOAND.length){noData('주택금융(대출)');return;}
  const lt=state.loanTab||'balance';
  const months=uniq(LOAND.map(d=>d.ym)).sort();
  const idx=new Map(LOAND.map(d=>[d.metric+'|'+d.ym,d.value]));
  const lv=(m,ym)=>{const v=idx.get(m+'|'+ym);return v==null?null:v;};
  const last=m=>{for(let i=months.length-1;i>=0;i--){const v=lv(m,months[i]);if(v!=null)return [months[i],v];}return [null,null];};
  const f1=n=>n==null?'-':n.toLocaleString('ko-KR',{maximumFractionDigits:1});
  const ymd=ym=>ym?`${ym.slice(0,4)}.${ym.slice(4)}`:'';
  const [ymB,hb]=last('주택담보'), je=last('전세')[1], ga=last('가계대출')[1], [ymR,rt]=last('주택담보금리');
  setSub(`전국 · 한국은행 통화금융통계 · 월별 ${months[0].slice(0,4)}~2026 · 잔액 ${ymd(ymB)} 기준`);
  document.getElementById('kpis').innerHTML=kpiHTML([
    {k:'주택담보대출 잔액',v:f1(hb),s:'조원'},
    {k:'전세자금대출 잔액',v:f1(je),s:'조원'},
    {k:'가계대출 중 주택담보',v:ga?`${(hb/ga*100).toFixed(0)}%`:'-',s:''},
    {k:'주택담보 금리',v:rt!=null?rt.toFixed(2):'-',s:`% (${ymd(ymR)})`}]);
  setInsight(`${ymd(ymB)} 주택담보대출 잔액 <b>${f1(hb)}조원</b> · 전세자금대출 <b>${f1(je)}조원</b> · 주택담보 금리 <b>${rt!=null?rt.toFixed(2):'-'}%</b>. <span class="note">※전세대출은 주택담보대출에 미포함(‘기타’에 포함) · 한국은행·전국·조원</span>`);
  const toolbar=`<div style="grid-column:1/-1;margin-bottom:6px;"><span class="seg"><button class="${lt==='balance'?'on':''}" onclick="setLoanTab('balance')">잔액</button><button class="${lt==='rate'?'on':''}" onclick="setLoanTab('rate')">금리</button></span></div>`;
  const LC={'주택담보':'#6ba2ff','전세':'#46dcb2','정책':'#ffc066','기타':'#9aa7bd'};
  if(lt==='rate'){
    document.getElementById('grid').innerHTML=toolbar+`<div class="panel full"><h3>주택담보대출 금리 추이 <span class="muted">(신규취급액 기준 · 월별)</span></h3><div class="chartbox tall"><canvas id="cL3"></canvas></div></div>`;
    draw('cL3',{type:'line',data:{labels:months,datasets:[{label:'주택담보 금리',borderColor:'#ffc066',backgroundColor:'transparent',pointRadius:0,borderWidth:1.6,spanGaps:true,data:months.map(ym=>lv('주택담보금리',ym))}]},
      options:baseOpts({plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.y}%`}}},scales:{x:{ticks:{color:'#c3cee0',maxTicksLimit:16},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>v+'%'},grid:{color:'#28324a'}}}})});
    return;
  }
  const KIND=['주택담보','전세','정책','기타'];
  const LLBL={'주택담보':'주택담보','전세':'전세(→기타에 포함)','정책':'정책(참고)','기타':'기타'};
  const Y=[];for(let yy=2004;yy<=2025;yy++)Y.push(String(yy));
  const decv=(m,yr)=>{const c=months.filter(ym=>ym.slice(0,4)===yr&&lv(m,ym)!=null);return c.length?lv(m,c[c.length-1]):null;};
  document.getElementById('grid').innerHTML=toolbar+`
    <div style="grid-column:1/-1;background:#12243f;border-left:3px solid var(--acc);padding:9px 13px;border-radius:0 8px 8px 0;font-size:13px;color:#dce9ff;">
      구성: <b style="color:#6ba2ff">주택담보</b> + <b style="color:#9aa7bd">기타</b> = 가계대출 전체. <b style="color:#46dcb2">전세</b>·<b style="color:#ffc066">정책</b>은 그 안의 <b>참고치(중복)</b>라 합산 ✕. → <b>전세대출은 주택담보대출이 아니라 ‘기타’에 들어있습니다.</b></div>
    <div class="panel full"><h3>대출 잔액 월별 추이 <span class="muted">(조원 · 전세·정책은 참고)</span></h3><div class="chartbox tall"><canvas id="cL1"></canvas></div></div>
    <div class="panel full"><h3>연도별(연말) 잔액 <span class="muted">(주택담보 vs 전세 · 조원 · 별개 분류 아님)</span></h3><div class="chartbox tall"><canvas id="cL2"></canvas></div></div>`;
  draw('cL1',{type:'line',data:{labels:months,datasets:KIND.map(k=>({label:LLBL[k],borderColor:LC[k],backgroundColor:'transparent',pointRadius:0,borderWidth:1.6,spanGaps:true,data:months.map(ym=>lv(k,ym))}))},
    options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${f1(c.parsed.y)}조`}}},scales:{x:{ticks:{color:'#c3cee0',maxTicksLimit:16},grid:{color:'#28324a'}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
  draw('cL2',{type:'bar',data:{labels:Y,datasets:[{label:'주택담보',backgroundColor:LC['주택담보'],data:Y.map(yr=>decv('주택담보',yr))},{label:'전세(주담대 아님·기타)',backgroundColor:LC['전세'],data:Y.map(yr=>decv('전세',yr))}]},
    options:baseOpts({plugins:{legend:{labels:{color:'#c3cee0',boxWidth:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${f1(c.parsed.y)}조`}}},scales:{x:{ticks:{color:'#c3cee0'},grid:{display:false}},y:{ticks:{color:'#c3cee0',callback:v=>fmt(v)},grid:{color:'#28324a'}}}})});
}

function noData(name){
  document.getElementById('kpis').innerHTML='';setSub('');
  setInsight(`<span class="note">${name} 데이터가 없습니다. <code>python fetch_kosis.py</code> 를 실행하세요.</span>`);
}

/* ===== 시작 (저장된 화면 상태 복원) ===== */
try{Object.assign(state,JSON.parse(localStorage.getItem('housingDash')||'{}'));}catch(e){}
if(!(state.view in TITLES))state.view='overview';
if(state.year!==ALL&&!H_YEARS.includes(state.year))state.year=lastOf(H_YEARS);
state.regions=Array.isArray(state.regions)?state.regions.filter(r=>ALL_REGIONS.includes(r)):['전국'];
navEl.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===state.view));
buildYearChips();buildRegionChips();render();
</script>
