<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 통계 대시보드</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    display: flex; flex-direction: column; height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: #f4f5f7;
  }
  header {
    flex: 0 0 auto;
    background: #1f2937;
    color: #fff;
    padding: 0 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,.18);
    z-index: 10;
  }
  .brand {
    padding: 12px 4px 6px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
    text-align: center;
  }
  .tabs { display: flex; gap: 4px; justify-content: center; }
  .tab {
    appearance: none; border: none; cursor: pointer;
    background: transparent; color: #cbd5e1;
    font-size: 15px; font-weight: 600;
    padding: 11px 20px; border-radius: 8px 8px 0 0;
    transition: background .15s, color .15s;
  }
  .tab:hover { color: #fff; background: rgba(255,255,255,.08); }
  .tab.active { color: #1f2937; background: #f4f5f7; }
  main { flex: 1 1 auto; position: relative; }
  iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: 0; background: #fff;
    display: none;
  }
  iframe.active { display: block; }
  @media (max-width: 600px) {
    .brand { font-size: 15px; }
    .tab { font-size: 13px; padding: 10px 12px; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">📊 부동산 통계 대시보드</div>
    <nav class="tabs">
      <button class="tab active" data-target="apt">전국 매매·전월세 통계</button>
      <button class="tab" data-target="housing">전국 주택통계</button>
    </nav>
  </header>
  <main>
    <iframe id="apt" class="active" src="apt/index.html" title="전국 매매·전월세 통계"></iframe>
    <iframe id="housing" data-src="housing/index.html" title="전국 주택통계"></iframe>
  </main>
  <script>
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const id = tab.dataset.target;
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        document.querySelectorAll('iframe').forEach(f => {
          const on = f.id === id;
          f.classList.toggle('active', on);
          // lazy-load on first activation
          if (on && !f.getAttribute('src') && f.dataset.src) f.src = f.dataset.src;
        });
      });
    });
  </script>
</body>
</html>
